services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - generated_images:/data/images:ro
      - ./content:/data/content:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: rpbot
      POSTGRES_USER: rpbot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "8080"
    environment:
      - DATABASE_URL=postgresql://rpbot:${DB_PASSWORD}@postgres:5432/rpbot
      - REDIS_URL=redis://redis:6379/0
      - BOT_TOKEN=${BOT_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_IDENTITY_MODEL=${OPENROUTER_IDENTITY_MODEL:-google/gemini-2.5-flash}
      - OPENROUTER_IDENTITY_TIMEOUT_SECONDS=${OPENROUTER_IDENTITY_TIMEOUT_SECONDS:-60}
      - CHAT_MODEL=${CHAT_MODEL:-deepseek/deepseek-v4-flash}
      - SUMMARY_MODEL=${SUMMARY_MODEL:-deepseek/deepseek-v4-flash}
      - PLAYER_MODEL=${PLAYER_MODEL:-deepseek/deepseek-v4-flash}
      - STRUCTURED_MODEL=${STRUCTURED_MODEL:-qwen/qwen3.6-flash}
      - SCENE_ANALYZER_MODEL=${SCENE_ANALYZER_MODEL:-qwen/qwen3.6-flash}
      - SCENE_ANALYZER_TIMEOUT=${SCENE_ANALYZER_TIMEOUT:-10}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - REPLICATE_REAL_MODEL=${REPLICATE_REAL_MODEL:-prunaai/z-image-turbo}
      - REPLICATE_REAL_WIDTH=${REPLICATE_REAL_WIDTH:-1024}
      - REPLICATE_REAL_HEIGHT=${REPLICATE_REAL_HEIGHT:-1024}
      - REPLICATE_REAL_NUM_INFERENCE_STEPS=${REPLICATE_REAL_NUM_INFERENCE_STEPS:-9}
      - REPLICATE_REAL_GUIDANCE_SCALE=${REPLICATE_REAL_GUIDANCE_SCALE:-0.0}
      - REPLICATE_REAL_TIMEOUT_SECONDS=${REPLICATE_REAL_TIMEOUT_SECONDS:-180}
      - REPLICATE_REAL_POLL_INTERVAL_SECONDS=${REPLICATE_REAL_POLL_INTERVAL_SECONDS:-2}
      - FAL_KEY=${FAL_KEY}
      - RUNPOD_API_KEY=${RUNPOD_API_KEY}
      - RUNPOD_KEY=${RUNPOD_KEY}
      - RUNPOD_MANHWA_ENDPOINT_ID=${RUNPOD_MANHWA_ENDPOINT_ID}
      - RUNPOD_MANHWA_TIMEOUT_SECONDS=${RUNPOD_MANHWA_TIMEOUT_SECONDS:-900}
      - RUNPOD_MANHWA_POLL_INTERVAL_SECONDS=${RUNPOD_MANHWA_POLL_INTERVAL_SECONDS:-3}
      - RUNPOD_FACEFUSION_ENDPOINT_ID=${RUNPOD_FACEFUSION_ENDPOINT_ID:-nif211wfdmdmc5}
      - RUNPOD_FACEFUSION_TIMEOUT_SECONDS=${RUNPOD_FACEFUSION_TIMEOUT_SECONDS:-1200}
      - RUNPOD_FACEFUSION_POLL_INTERVAL_SECONDS=${RUNPOD_FACEFUSION_POLL_INTERVAL_SECONDS:-3}
      - RUNPOD_FACEFUSION_PRESET=${RUNPOD_FACEFUSION_PRESET:-hyperswap_1a_512}
      - RUNPOD_FACEFUSION_OUTPUT_FORMAT=${RUNPOD_FACEFUSION_OUTPUT_FORMAT:-png}
      - RUNPOD_FACEFUSION_EXECUTION_TIMEOUT_MS=${RUNPOD_FACEFUSION_EXECUTION_TIMEOUT_MS:-1200000}
      - RUNPOD_FACEFUSION_TTL_MS=${RUNPOD_FACEFUSION_TTL_MS:-3600000}
      - IMAGES_BASE_URL=${IMAGES_BASE_URL:-http://localhost/images}
      - IMAGES_STORAGE_PATH=/app/generated_images
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS}
      - SECRET_KEY=${SECRET_KEY}
      - DEV_MODE=${DEV_MODE:-true}
      - FRONTEND_URL=http://frontend:5173  # dev
    volumes:
      - ./backend/api:/app/api
      - ./backend/admin:/app/admin
      - ./backend/auth:/app/auth
      - ./backend/services:/app/services
      - ./backend/static:/app/static
      - ./backend/main.py:/app/main.py
      - ./backend/config.py:/app/config.py
      - ./content:/app/content:ro
      - ./shared:/app/shared:ro
      - ./bot:/app/bot:ro
      - generated_images:/app/generated_images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/dist
    restart: "unless-stopped"

  worker:
    build: ./backend
    command: arq shared.queue.worker.WorkerSettings
    environment:
      - DATABASE_URL=postgresql://rpbot:${DB_PASSWORD}@postgres:5432/rpbot
      - REDIS_URL=redis://redis:6379/0
      - BOT_TOKEN=${BOT_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_IDENTITY_MODEL=${OPENROUTER_IDENTITY_MODEL:-google/gemini-2.5-flash}
      - OPENROUTER_IDENTITY_TIMEOUT_SECONDS=${OPENROUTER_IDENTITY_TIMEOUT_SECONDS:-60}
      - CHAT_MODEL=${CHAT_MODEL:-deepseek/deepseek-v4-flash}
      - SUMMARY_MODEL=${SUMMARY_MODEL:-deepseek/deepseek-v4-flash}
      - PLAYER_MODEL=${PLAYER_MODEL:-deepseek/deepseek-v4-flash}
      - STRUCTURED_MODEL=${STRUCTURED_MODEL:-qwen/qwen3.6-flash}
      - SCENE_ANALYZER_MODEL=${SCENE_ANALYZER_MODEL:-qwen/qwen3.6-flash}
      - SCENE_ANALYZER_TIMEOUT=${SCENE_ANALYZER_TIMEOUT:-10}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - REPLICATE_REAL_MODEL=${REPLICATE_REAL_MODEL:-prunaai/z-image-turbo}
      - REPLICATE_REAL_WIDTH=${REPLICATE_REAL_WIDTH:-1024}
      - REPLICATE_REAL_HEIGHT=${REPLICATE_REAL_HEIGHT:-1024}
      - REPLICATE_REAL_NUM_INFERENCE_STEPS=${REPLICATE_REAL_NUM_INFERENCE_STEPS:-9}
      - REPLICATE_REAL_GUIDANCE_SCALE=${REPLICATE_REAL_GUIDANCE_SCALE:-0.0}
      - REPLICATE_REAL_TIMEOUT_SECONDS=${REPLICATE_REAL_TIMEOUT_SECONDS:-180}
      - REPLICATE_REAL_POLL_INTERVAL_SECONDS=${REPLICATE_REAL_POLL_INTERVAL_SECONDS:-2}
      - FAL_KEY=${FAL_KEY}
      - RUNPOD_API_KEY=${RUNPOD_API_KEY}
      - RUNPOD_KEY=${RUNPOD_KEY}
      - RUNPOD_MANHWA_ENDPOINT_ID=${RUNPOD_MANHWA_ENDPOINT_ID}
      - RUNPOD_MANHWA_TIMEOUT_SECONDS=${RUNPOD_MANHWA_TIMEOUT_SECONDS:-900}
      - RUNPOD_MANHWA_POLL_INTERVAL_SECONDS=${RUNPOD_MANHWA_POLL_INTERVAL_SECONDS:-3}
      - RUNPOD_FACEFUSION_ENDPOINT_ID=${RUNPOD_FACEFUSION_ENDPOINT_ID:-nif211wfdmdmc5}
      - RUNPOD_FACEFUSION_TIMEOUT_SECONDS=${RUNPOD_FACEFUSION_TIMEOUT_SECONDS:-1200}
      - RUNPOD_FACEFUSION_POLL_INTERVAL_SECONDS=${RUNPOD_FACEFUSION_POLL_INTERVAL_SECONDS:-3}
      - RUNPOD_FACEFUSION_PRESET=${RUNPOD_FACEFUSION_PRESET:-hyperswap_1a_512}
      - RUNPOD_FACEFUSION_OUTPUT_FORMAT=${RUNPOD_FACEFUSION_OUTPUT_FORMAT:-png}
      - RUNPOD_FACEFUSION_EXECUTION_TIMEOUT_MS=${RUNPOD_FACEFUSION_EXECUTION_TIMEOUT_MS:-1200000}
      - RUNPOD_FACEFUSION_TTL_MS=${RUNPOD_FACEFUSION_TTL_MS:-3600000}
      - IMAGE_JOB_TIMEOUT=${IMAGE_JOB_TIMEOUT:-1200}
      - IMAGES_BASE_URL=${IMAGES_BASE_URL:-http://localhost/images}
      - IMAGES_STORAGE_PATH=/app/generated_images
    volumes:
      - ./backend/api:/app/api
      - ./backend/services:/app/services
      - ./shared:/app/shared:ro
      - ./content:/app/content:ro
      - generated_images:/app/generated_images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build: ./bot
    ports:
      - "${WEBHOOK_PORT:-8443}:${WEBHOOK_PORT}"
    environment:
      - DATABASE_URL=postgresql://rpbot:${DB_PASSWORD}@postgres:5432/rpbot
      - REDIS_URL=redis://redis:6379/0
      - BOT_TOKEN=${BOT_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CHAT_MODEL=${CHAT_MODEL:-deepseek/deepseek-v4-flash}
      - SUMMARY_MODEL=${SUMMARY_MODEL:-deepseek/deepseek-v4-flash}
      - PLAYER_MODEL=${PLAYER_MODEL:-deepseek/deepseek-v4-flash}
      - STRUCTURED_MODEL=${STRUCTURED_MODEL:-qwen/qwen3.6-flash}
      - SCENE_ANALYZER_MODEL=${SCENE_ANALYZER_MODEL:-qwen/qwen3.6-flash}
      - SCENE_ANALYZER_TIMEOUT=${SCENE_ANALYZER_TIMEOUT:-10}
      - WEBAPP_URL=${WEBAPP_URL}
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_PATH=${WEBHOOK_PATH}
      - WEBHOOK_HOST=${WEBHOOK_HOST}
      - WEBHOOK_PORT=${WEBHOOK_PORT}
      - IS_PROD=${IS_PROD:-false}
    volumes:
      - ./bot/handlers:/app/handlers
      - ./bot/main.py:/app/main.py
      - ./bot/config.py:/app/config.py
      - ./content:/app/content:ro
      - ./shared:/app/shared:ro
      - ./scripts:/app/scripts:ro
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sys; sys.exit(0)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  seed:
    build: ./bot
    command: >
      sh -c "
        echo 'Waiting for migrations to complete...' &&
        sleep 10 &&
        echo 'Initializing prompts...' &&
        python /app/scripts/init_prompts.py --sync-compact &&
        echo 'Seeding content...' &&
        python /app/scripts/seed_content.py
      "
    environment:
      - DATABASE_URL=postgresql://rpbot:${DB_PASSWORD}@postgres:5432/rpbot
    volumes:
      - ./scripts:/app/scripts:ro
      - ./content:/app/content:ro
      - ./shared:/app/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      bot:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  generated_images:
  frontend_dist:
