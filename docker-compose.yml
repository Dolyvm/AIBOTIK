x-app-env: &app-env
  DATABASE_URL: postgresql://rpbot:${DB_PASSWORD}@postgres:5432/rpbot
  REDIS_URL: redis://redis:6379/0
  BOT_TOKEN: ${BOT_TOKEN}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
  CHAT_MODEL: ${CHAT_MODEL:-deepseek/deepseek-v4-flash}
  SUMMARY_MODEL: ${SUMMARY_MODEL:-deepseek/deepseek-v4-flash}
  PLAYER_MODEL: ${PLAYER_MODEL:-deepseek/deepseek-v4-flash}
  STRUCTURED_MODEL: ${STRUCTURED_MODEL:-qwen/qwen3.6-flash}
  LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-deepseek_v4_flash}
  LLM_MODEL: ${LLM_MODEL:-deepseek/deepseek-v4-flash}
  LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.35}
  LLM_TOP_P: ${LLM_TOP_P:-0.9}
  LLM_REPETITION_PENALTY: ${LLM_REPETITION_PENALTY:-1.15}
  REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
  REPLICATE_POLL_TIMEOUT_SECONDS: ${REPLICATE_POLL_TIMEOUT_SECONDS:-900}
  REPLICATE_POLL_INTERVAL_SECONDS: ${REPLICATE_POLL_INTERVAL_SECONDS:-3}
  IMAGES_BASE_URL: ${IMAGES_BASE_URL:-http://localhost/images}
  IMAGES_STORAGE_PATH: /app/generated_images
  ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - generated_images:/data/images:ro
      - ./content:/data/content:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: rpbot
      POSTGRES_USER: rpbot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: bot/Dockerfile
    command: >
      sh -c "
        alembic upgrade head &&
        python /app/scripts/init_prompts.py --sync-compact --sync-photo
      "
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8080"
    environment:
      <<: *app-env
      SECRET_KEY: ${SECRET_KEY}
      WEBAPP_URL: ${WEBAPP_URL}
      PLATEGA_MERCHANT_ID: ${PLATEGA_MERCHANT_ID}
      PLATEGA_SECRET: ${PLATEGA_SECRET}
      PLATEGA_BASE_URL: ${PLATEGA_BASE_URL:-https://app.platega.io/}
      DEV_MODE: ${DEV_MODE:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://frontend}
    volumes:
      - generated_images:/app/generated_images
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/dist
    restart: "unless-stopped"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: arq shared.queue.worker.WorkerSettings
    environment:
      <<: *app-env
      WORKER_JOB_TIMEOUT: ${WORKER_JOB_TIMEOUT:-900}
    volumes:
      - generated_images:/app/generated_images
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    ports:
      - "${WEBHOOK_PORT:-8443}:${WEBHOOK_PORT:-8443}"
    environment:
      <<: *app-env
      WEBAPP_URL: ${WEBAPP_URL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/webhook}
      WEBHOOK_HOST: ${WEBHOOK_HOST:-0.0.0.0}
      WEBHOOK_PORT: ${WEBHOOK_PORT:-8443}
      IS_PROD: ${IS_PROD:-false}
    depends_on:
      migrate:
        condition: service_completed_successfully
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sys; sys.exit(0)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  seed:
    build:
      context: .
      dockerfile: bot/Dockerfile
    command: >
      sh -c "
        echo 'Seeding content...' &&
        python /app/scripts/seed_content.py
      "
    environment:
      <<: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  generated_images:
  frontend_dist:
