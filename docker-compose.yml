version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - generated_images:/data/images:ro
      - ./content:/data/content:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - webapp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: rpbot
      POSTGRES_USER: rpbot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  webapp:
    build: ./webapp
    expose:
      - "8080"
    environment:
      - DATABASE_URL=postgresql://rpbot:${DB_PASSWORD}@postgres:5432/rpbot
      - REDIS_URL=redis://redis:6379/0
      - BOT_TOKEN=${BOT_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - FAL_KEY=${FAL_KEY}
      - IMAGES_BASE_URL=${IMAGES_BASE_URL:-http://localhost/images}
      - IMAGES_STORAGE_PATH=/app/generated_images
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./webapp/api:/app/api
      - ./webapp/admin:/app/admin
      - ./webapp/auth:/app/auth
      - ./webapp/services:/app/services
      - ./webapp/static:/app/static
      - ./webapp/main.py:/app/main.py
      - ./webapp/config.py:/app/config.py
      - ./content:/app/content:ro
      - ./shared:/app/shared:ro
      - ./bot:/app/bot:ro
      - generated_images:/app/generated_images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./webapp
    command: arq shared.queue.worker.WorkerSettings
    environment:
      - DATABASE_URL=postgresql://rpbot:${DB_PASSWORD}@postgres:5432/rpbot
      - REDIS_URL=redis://redis:6379/0
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - FAL_KEY=${FAL_KEY}
      - IMAGES_BASE_URL=${IMAGES_BASE_URL:-http://localhost/images}
      - IMAGES_STORAGE_PATH=/app/generated_images
    volumes:
      - ./webapp/api:/app/api
      - ./webapp/services:/app/services
      - ./shared:/app/shared:ro
      - ./content:/app/content:ro
      - generated_images:/app/generated_images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build: ./bot
    ports:
      - "${WEBHOOK_PORT:-8443}:${WEBHOOK_PORT}"
    environment:
      - DATABASE_URL=postgresql://rpbot:${DB_PASSWORD}@postgres:5432/rpbot
      - REDIS_URL=redis://redis:6379/0
      - BOT_TOKEN=${BOT_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - WEBAPP_URL=${WEBAPP_URL}
      - ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - WEBHOOK_PATH=${WEBHOOK_PATH}
      - WEBHOOK_HOST=${WEBHOOK_HOST}
      - WEBHOOK_PORT=${WEBHOOK_PORT}
    volumes:
      - ./bot/handlers:/app/handlers
      - ./bot/main.py:/app/main.py
      - ./bot/config.py:/app/config.py
      - ./content:/app/content:ro
      - ./shared:/app/shared:ro
      - ./scripts:/app/scripts:ro
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      webapp:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sys; sys.exit(0)'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  seed:
    build: ./bot
    command: >
      sh -c "
        echo 'Waiting for migrations to complete...' &&
        sleep 10 &&
        echo 'Initializing prompts...' &&
        python /app/scripts/init_prompts.py &&
        echo 'Seeding content...' &&
        python /app/scripts/seed_content.py
      "
    environment:
      - DATABASE_URL=postgresql://rpbot:${DB_PASSWORD}@postgres:5432/rpbot
    volumes:
      - ./scripts:/app/scripts:ro
      - ./content:/app/content:ro
      - ./shared:/app/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      bot:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  generated_images:
