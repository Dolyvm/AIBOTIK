services:
  nginx:
    volumes:
      - ./nginx/nginx.ngrok.conf:/etc/nginx/nginx.conf:ro
      - generated_images:/data/images:ro
      - ./content:/data/content:ro
      - frontend_dist:/usr/share/nginx/html:ro

  bot:
    environment:
      IS_PROD: "true"
      WEBHOOK_URL: ${NGROK_URL}
      WEBAPP_URL: ${NGROK_URL}
      WEBHOOK_PATH: /webhook
      WEBHOOK_HOST: 0.0.0.0
      WEBHOOK_PORT: 8443
