<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Botik</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="app">
        <!-- View: Character Selection -->
        <div id="character-view" class="view active">
            <div class="header">
                <h1>🎭 Выбери персонажа</h1>
            </div>
            <div id="characters-grid" class="characters-grid">
                <!-- Characters will be loaded here -->
            </div>
        </div>

        <!-- View: Scenario Selection -->
        <div id="scenario-view" class="view">
            <div class="header">
                <button id="back-btn" class="back-btn">← Назад</button>
                <h1 id="character-name">Сценарии</h1>
            </div>
            <div id="scenarios-list" class="scenarios-list">
                <!-- Scenarios will be loaded here -->
            </div>
        </div>

        <!-- View: Status -->
        <div id="status-view" class="view">
            <div class="header">
                <button id="status-back-btn" class="back-btn">← Назад</button>
                <h1>📊 Статус</h1>
            </div>
            <div id="status-content" class="status-content">
                <!-- Status will be loaded here -->
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button id="nav-characters" class="nav-btn active">
                🎭<br><span>Персонажи</span>
            </button>
            <button id="nav-status" class="nav-btn">
                📊<br><span>Статус</span>
            </button>
        </div>

        <!-- Scenario Modal -->
        <div id="scenario-modal" class="modal hidden">
            <div class="modal-content">
                <button id="modal-close" class="modal-close">×</button>
                <h2 id="modal-title">Сценарий</h2>
                <div id="modal-text" class="modal-text"></div>
                <button id="modal-start" class="modal-start-btn">Начать чат</button>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
