worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript image/svg+xml;

    # Client body size for image uploads
    client_max_body_size 50M;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    upstream webapp {
        server webapp:8080;
    }
    server {
        listen 80;
        server_name aikai.xyz;

        location ^~ /.well-known/acme-challenge/ {
            alias /.well-known/acme-challenge/;
            try_files $uri =404;
        }

        # to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
	http2 on;
        server_name aikai.xyz;

	ssl_certificate     /etc/letsencrypt/live/aikai.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/aikai.xyz/privkey.pem;
        
	ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Generated images - static files
        location /images/ {
            alias /data/images/;
            expires 30d;
            add_header Cache-Control "public, immutable";

            # CORS headers for images
            add_header Access-Control-Allow-Origin *;

            # Try file, return 404 if not found
            try_files $uri =404;
        }

        # Content static files (character images, etc.)
        location /content/ {
            alias /data/content/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Static files from webapp
        location /static/ {
            proxy_pass http://webapp;
            proxy_cache_valid 200 1d;
            expires 1d;
        }

        # API endpoints - proxy to webapp
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://webapp;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings for long-running image generation
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # Root - serve index.html
        location / {
            proxy_pass http://webapp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            #root /data/content;
	    #index index.html;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
